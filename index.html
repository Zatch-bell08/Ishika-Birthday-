<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Ishika Didi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }body {
  overflow: hidden;
  background: linear-gradient(135deg, #87cefa, #5dade2, #1f3c88);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  position: relative;
}

.floating-hearts span {
  position: absolute;
  bottom: -50px;
  font-size: 24px;
  animation: floatUp 10s linear infinite;
  opacity: 0.8;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  100% {
    transform: translateY(-110vh) rotate(360deg);
    opacity: 0;
  }
}

.envelope-wrapper {
  perspective: 1200px;
  z-index: 2;
}

.envelope {
  position: relative;
  width: 340px;
  height: 230px;
  cursor: pointer;
  transform-style: preserve-3d;
}

.envelope-front {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #5dade2, #1f3c88);
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  overflow: hidden;
}

.envelope-front::before,
.envelope-front::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.08);
  clip-path: polygon(0 0, 50% 55%, 100% 0);
}

.envelope-front::after {
  clip-path: polygon(0 100%, 50% 45%, 100% 100%);
}

.envelope-flap {
  position: absolute;
  width: 100%;
  height: 120px;
  background: linear-gradient(135deg, #87cefa, #5dade2);
  clip-path: polygon(0 0, 50% 100%, 100% 0);
  transform-origin: top;
  transition: transform 1s ease;
  z-index: 5;
  border-radius: 18px 18px 0 0;
}

.letter {
  position: absolute;
  left: 50%;
  top: 25px;
  transform: translateX(-50%);
  width: 92%;
  max-width: 420px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(14px);
  border-radius: 28px;
  padding: 30px 20px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.2);
  text-align: center;
  color: white;
  opacity: 0;
  transform: translateX(-50%) translateY(40px);
  transition: all 1s ease;
  z-index: 2;
}

.envelope.open .envelope-flap {
  transform: rotateX(180deg) translateY(-40px);
  opacity: 0;
  transition: all 1.2s ease;
}

.envelope.open .envelope-front {
  animation: fallAway 1.5s forwards;
}

.envelope.open .letter {
  opacity: 1;
  transform: translateX(-50%) translateY(-180px) scale(1.02);
}

@keyframes fallAway {
  0% {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  60% {
    transform: translateY(80px) rotate(6deg);
    opacity: 0.8;
  }
  100% {
    transform: translateY(220px) rotate(12deg);
    opacity: 0;
  }
}
  width: 90%;
  max-width: 420px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(14px);
  border-radius: 28px;
  padding: 30px 20px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.2);
  animation: popIn 1s ease;
  z-index: 2;
}

@keyframes popIn {
  from {
    transform: scale(0.7);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

h1 {
  font-size: 2rem;
  margin-bottom: 12px;
  line-height: 1.3;
}

.emoji {
  font-size: 3rem;
  animation: bounce 1.8s infinite;
  display: inline-block;
  margin-bottom: 15px;
}

@keyframes bounce {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-10px);
  }
}

p {
  font-size: 1rem;
  opacity: 0.95;
  margin-bottom: 24px;
  line-height: 1.6;
}

.btn {
  background: white;
  color: #1f3c88;
  border: none;
  padding: 14px 22px;
  border-radius: 999px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s ease;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.btn:hover {
  transform: scale(1.05);
}

.hidden-message {
  margin-top: 20px;
  font-size: 1.05rem;
  display: none;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  animation: sparkleAnim 2s linear infinite;
}

@keyframes sparkleAnim {
  from {
    transform: translateY(0) scale(0);
    opacity: 1;
  }
  to {
    transform: translateY(-80px) scale(1.5);
    opacity: 0;
  }
}

  </style>
</head>
<body>  <div class="floating-hearts" id="hearts"></div>  <div class="envelope-wrapper" id="envelopeWrapper">
    <div class="envelope" onclick="openEnvelope()">
      <div class="envelope-front"></div>
      <div class="envelope-flap" id="flap"></div><div class="letter" id="letter">
    <div class="emoji">🎂</div>
    <h1>Happy Birthday Day,<br> Ishika Didi 🩵💙</h1>
    <p>
      Wishing you a day filled with happiness, laughter, memories, and endless smiles ✨
    </p>

    <button class="btn" onclick="showMessage(event)">Tap for Surprise 🎁</button>

    <div class="hidden-message" id="message">
      💫 You are amazing, kind, and truly special.<br><br>
      May your life always shine bright like these blue skies 🩵💙<br><br>
      ✨ Happy Birthday Once Again ✨
    </div>
  </div>
</div>

  </div>  <audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>  <script>
    const hearts = document.getElementById('hearts');

    function createHeart() {
      const heart = document.createElement('span');
      const icons = ['🩵', '💙', '✨', '🎉'];
      heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
      heart.style.fontSize = (Math.random() * 20 + 18) + 'px';
      hearts.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 10000);
    }

    setInterval(createHeart, 400);

    function openEnvelope() {
      const envelope = document.querySelector('.envelope');
      envelope.classList.add('open');

      const music = document.getElementById('music');
      music.volume = 0.4;
      music.play().catch(() => {});

      createSparkles();
    }

    function showMessage(event) {
      event.stopPropagation();
      document.getElementById('message').style.display = 'block';
      createSparkles();

      if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200]);
      }
    }

    function createSparkles() {
      for (let i = 0; i < 30; i++) {
        const sparkle = document.createElement('div');
        sparkle.classList.add('sparkle');
        sparkle.style.left = Math.random() * window.innerWidth + 'px';
        sparkle.style.top = Math.random() * window.innerHeight + 'px';
        sparkle.style.animationDuration = (Math.random() * 2 + 1) + 's';
        document.body.appendChild(sparkle);

        setTimeout(() => sparkle.remove(), 2500);
      }
    }

    document.body.addEventListener('click', () => {
      const music = document.getElementById('music');
      music.play().catch(() => {});
    });
  </script></body>
</html>
